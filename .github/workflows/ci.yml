name: CI - Train + Build Docker (Advanced)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  train-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install mlflow dagshub

      - name: Run Training (MLflow Project)
        run: |
          cd MLProject
          mlflow run . --experiment-name "Credit_Scoring_Advanced_RafiAditya"

      - name: Build Docker Image
        run: |
          mlflow models build-docker \
            -m "runs:/4e8daac8bcc24f49bf10038a4fafe69b/model" \
            -n credit-scoring-api \
            --enable-mlserver

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push Docker Image
        run: |
          docker tag credit-scoring-api:latest ${{ secrets.DOCKER_USERNAME }}/credit-scoring-api:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/credit-scoring-api:latest
