name: CI - Train + Build Docker (Advanced)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  train-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Training Script
        working-directory: ./MLProject
        env:
          DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
        run: python modelling_tuning.py

      - name: Build Docker Image
        run: |
          mlflow models build-docker \
            -m "runs:/6e97bfd407b74830b4477c4d6be75941/model" \
            -n credit-scoring-api

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push Image
        run: |
          docker tag credit-scoring-api:latest ${{ secrets.DOCKER_USERNAME }}/credit-scoring-api:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/credit-scoring-api:latest
